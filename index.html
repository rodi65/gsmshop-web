<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEPLOG</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

<script>
  (function () {
    const STORAGE_KEY = "ceplog_screen_zoom";
    const POSITION_STORAGE_KEY = "ceplog_zoom_control_position";
    const MIN_ZOOM = 0.75;
    const MAX_ZOOM = 1.25;
    const STEP = 0.05;

    function clamp(value) {
      return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, value));
    }

    function getZoom() {
      const saved = Number(localStorage.getItem(STORAGE_KEY));
      return saved ? clamp(saved) : 1;
    }

    function applyZoom(value) {
      const zoom = clamp(value);
      const root = document.getElementById("root");
      if (root) {
        root.style.zoom = String(zoom);
      }
      const zoomedIn = zoom > 1.001;
      document.documentElement.style.setProperty("--ceplog-screen-zoom", String(zoom));
      document.documentElement.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.style.minHeight = zoomedIn ? Math.ceil(zoom * 100) + "vh" : "";
      localStorage.setItem(STORAGE_KEY, String(zoom));

      const label = document.getElementById("ceplogZoomLabel");
      if (label) label.textContent = Math.round(zoom * 100) + "%";
    }


    function clampPosition(position) {
      const margin = 8;
      const control = document.getElementById("ceplogZoomControl");
      const width = control?.offsetWidth || 150;
      const height = control?.offsetHeight || 48;
      const maxLeft = Math.max(margin, window.innerWidth - width - margin);
      const maxTop = Math.max(margin, window.innerHeight - height - margin);
      return {
        left: Math.min(maxLeft, Math.max(margin, Number(position?.left) || 14)),
        top: Math.min(maxTop, Math.max(margin, Number(position?.top) || 14)),
      };
    }

    function getSavedPosition() {
      try {
        return JSON.parse(localStorage.getItem(POSITION_STORAGE_KEY) || "null");
      } catch (error) {
        return null;
      }
    }

    function applyZoomControlPosition(position, save) {
      const next = clampPosition(position || getSavedPosition() || { left: window.innerWidth - 170, top: 98 });
      document.documentElement.style.setProperty("--ceplog-zoom-left", next.left + "px");
      document.documentElement.style.setProperty("--ceplog-zoom-top", next.top + "px");
      if (save) localStorage.setItem(POSITION_STORAGE_KEY, JSON.stringify(next));
      return next;
    }

    function makeButton(text, title, onClick) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.title = title;
      btn.type = "button";
      btn.style.border = "0";
      btn.style.borderRadius = "10px";
      btn.style.background = "#071226";
      btn.style.color = "#fff";
      btn.style.fontWeight = "900";
      btn.style.fontSize = "14px";
      btn.style.height = "34px";
      btn.style.minWidth = "34px";
      btn.style.cursor = "pointer";
      btn.style.boxShadow = "0 8px 18px rgba(7,18,38,.18)";
      btn.onclick = onClick;
      return btn;
    }

    function createZoomControl() {
      if (document.getElementById("ceplogZoomControl")) return;

      const wrap = document.createElement("div");
      wrap.id = "ceplogZoomControl";
      wrap.style.position = "fixed";
      wrap.style.right = "14px";
      wrap.style.bottom = "14px";
      wrap.style.zIndex = "999999";
      wrap.style.display = "flex";
      wrap.style.alignItems = "center";
      wrap.style.gap = "6px";
      wrap.style.padding = "7px";
      wrap.style.borderRadius = "16px";
      wrap.style.background = "rgba(255,255,255,.92)";
      wrap.style.border = "1px solid #dbe3ef";
      wrap.style.boxShadow = "0 14px 35px rgba(15,23,42,.18)";
      wrap.style.backdropFilter = "blur(12px)";
      wrap.style.userSelect = "none";

      const dragHandle = makeButton("↕", "Zoom tuşunun konumunu taşı", function () {});
      dragHandle.setAttribute("aria-label", "Zoom konumunu taşı");
      dragHandle.style.cursor = "grab";
      dragHandle.style.background = "#1d4ed8";

      let dragState = null;
      dragHandle.addEventListener("pointerdown", function (event) {
        event.preventDefault();
        const current = applyZoomControlPosition();
        dragState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          startLeft: current.left,
          startTop: current.top,
        };
        dragHandle.setPointerCapture?.(event.pointerId);
        dragHandle.style.cursor = "grabbing";
      });

      dragHandle.addEventListener("pointermove", function (event) {
        if (!dragState || dragState.pointerId !== event.pointerId) return;
        applyZoomControlPosition({
          left: dragState.startLeft + event.clientX - dragState.startX,
          top: dragState.startTop + event.clientY - dragState.startY,
        });
      });

      function stopDrag(event) {
        if (!dragState || dragState.pointerId !== event.pointerId) return;
        const current = applyZoomControlPosition({
          left: dragState.startLeft + event.clientX - dragState.startX,
          top: dragState.startTop + event.clientY - dragState.startY,
        }, true);
        dragState = null;
        dragHandle.style.cursor = "grab";
        dragHandle.releasePointerCapture?.(event.pointerId);
        applyZoomControlPosition(current, true);
      }

      dragHandle.addEventListener("pointerup", stopDrag);
      dragHandle.addEventListener("pointercancel", stopDrag);

      window.addEventListener("resize", function () {
        applyZoomControlPosition(getSavedPosition(), true);
      });

      const minus = makeButton("−", "Ekranı küçült", function () {
        applyZoom(getZoom() - STEP);
      });

      const label = document.createElement("button");
      label.id = "ceplogZoomLabel";
      label.type = "button";
      label.title = "Ekranı 100% yap";
      label.textContent = Math.round(getZoom() * 100) + "%";
      label.style.border = "0";
      label.style.borderRadius = "10px";
      label.style.background = "#eff6ff";
      label.style.color = "#1d4ed8";
      label.style.fontWeight = "1000";
      label.style.fontSize = "12px";
      label.style.height = "34px";
      label.style.minWidth = "52px";
      label.style.cursor = "pointer";
      label.onclick = function () {
        applyZoom(1);
      };

      const plus = makeButton("+", "Ekranı büyüt", function () {
        applyZoom(getZoom() + STEP);
      });

      wrap.appendChild(dragHandle);
      wrap.appendChild(minus);
      wrap.appendChild(label);
      wrap.appendChild(plus);
      document.body.appendChild(wrap);

      applyZoomControlPosition(getSavedPosition(), Boolean(getSavedPosition()));
      applyZoom(getZoom());
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", createZoomControl);
    } else {
      createZoomControl();
    }
  })();
</script>

</body>
</html>
