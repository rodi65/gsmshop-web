<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEPLOG</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

<script>
  (function () {
    const STORAGE_KEY = "ceplog_screen_zoom";
    const POSITION_STORAGE_KEY = "ceplog_zoom_control_position";
    const MIN_ZOOM = 0.75;
    const MAX_ZOOM = 1.25;
    const STEP = 0.05;

    function clamp(value) {
      return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, value));
    }

    function getZoom() {
      const saved = Number(localStorage.getItem(STORAGE_KEY));
      return saved ? clamp(saved) : 1;
    }

    function applyZoom(value) {
      const zoom = clamp(value);
      const root = document.getElementById("root");
      if (root) {
        root.style.zoom = String(zoom);
      }
      const zoomedIn = zoom > 1.001;
      document.documentElement.style.setProperty("--ceplog-screen-zoom", String(zoom));
      document.documentElement.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.style.minHeight = zoomedIn ? Math.ceil(zoom * 100) + "vh" : "";
      localStorage.setItem(STORAGE_KEY, String(zoom));

      const label = document.getElementById("ceplogZoomLabel");
      if (label) label.textContent = Math.round(zoom * 100) + "%";
    }

    function getSavedZoomPosition() {
      try {
        const parsed = JSON.parse(localStorage.getItem(POSITION_STORAGE_KEY) || "null");
        if (!parsed || !Number.isFinite(parsed.x) || !Number.isFinite(parsed.y)) return null;
        return parsed;
      } catch (error) {
        return null;
      }
    }

    function keepZoomControlInViewport(x, y, element) {
      const width = element?.offsetWidth || 150;
      const height = element?.offsetHeight || 48;
      const margin = 8;
      return {
        x: Math.min(Math.max(margin, x), Math.max(margin, window.innerWidth - width - margin)),
        y: Math.min(Math.max(margin, y), Math.max(margin, window.innerHeight - height - margin)),
      };
    }

    function placeZoomControl(element, x, y, save = true) {
      if (!element) return;
      const next = keepZoomControlInViewport(x, y, element);
      element.classList.add("ceplog-zoom-dragged");
      element.style.setProperty("left", next.x + "px", "important");
      element.style.setProperty("top", next.y + "px", "important");
      element.style.setProperty("right", "auto", "important");
      element.style.setProperty("bottom", "auto", "important");
      if (save) localStorage.setItem(POSITION_STORAGE_KEY, JSON.stringify(next));
    }

    function enableZoomControlDrag(element, handle) {
      if (!element || !handle) return;
      let dragState = null;

      handle.addEventListener("pointerdown", function (event) {
        event.preventDefault();
        const rect = element.getBoundingClientRect();
        dragState = {
          offsetX: event.clientX - rect.left,
          offsetY: event.clientY - rect.top,
        };
        element.classList.add("ceplog-zoom-dragging");
        handle.setPointerCapture?.(event.pointerId);
      });

      handle.addEventListener("pointermove", function (event) {
        if (!dragState) return;
        placeZoomControl(element, event.clientX - dragState.offsetX, event.clientY - dragState.offsetY);
      });

      function stopDrag(event) {
        if (!dragState) return;
        dragState = null;
        element.classList.remove("ceplog-zoom-dragging");
        handle.releasePointerCapture?.(event.pointerId);
      }

      handle.addEventListener("pointerup", stopDrag);
      handle.addEventListener("pointercancel", stopDrag);
      window.addEventListener("resize", function () {
        const saved = getSavedZoomPosition();
        if (saved) placeZoomControl(element, saved.x, saved.y);
      });
    }

    function makeButton(text, title, onClick) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.title = title;
      btn.type = "button";
      btn.style.border = "0";
      btn.style.borderRadius = "10px";
      btn.style.background = "#071226";
      btn.style.color = "#fff";
      btn.style.fontWeight = "900";
      btn.style.fontSize = "14px";
      btn.style.height = "34px";
      btn.style.minWidth = "34px";
      btn.style.cursor = "pointer";
      btn.style.boxShadow = "0 8px 18px rgba(7,18,38,.18)";
      btn.onclick = onClick;
      return btn;
    }

    function createZoomControl() {
      if (document.getElementById("ceplogZoomControl")) return;

      const wrap = document.createElement("div");
      wrap.id = "ceplogZoomControl";
      wrap.style.position = "fixed";
      wrap.style.right = "14px";
      wrap.style.bottom = "14px";
      wrap.style.zIndex = "999999";
      wrap.style.display = "flex";
      wrap.style.alignItems = "center";
      wrap.style.gap = "6px";
      wrap.style.padding = "7px";
      wrap.style.borderRadius = "16px";
      wrap.style.background = "rgba(255,255,255,.92)";
      wrap.style.border = "1px solid #dbe3ef";
      wrap.style.boxShadow = "0 14px 35px rgba(15,23,42,.18)";
      wrap.style.backdropFilter = "blur(12px)";

      const dragHandle = document.createElement("button");
      dragHandle.type = "button";
      dragHandle.textContent = "↕";
      dragHandle.title = "Zoom tuşunu taşımak için sürükle";
      dragHandle.setAttribute("aria-label", "Zoom tuşunu taşı");
      dragHandle.style.border = "0";
      dragHandle.style.borderRadius = "10px";
      dragHandle.style.background = "#e2e8f0";
      dragHandle.style.color = "#102848";
      dragHandle.style.fontWeight = "1000";
      dragHandle.style.fontSize = "15px";
      dragHandle.style.height = "34px";
      dragHandle.style.minWidth = "28px";
      dragHandle.style.cursor = "grab";
      dragHandle.style.touchAction = "none";

      const minus = makeButton("−", "Ekranı küçült", function () {
        applyZoom(getZoom() - STEP);
      });

      const label = document.createElement("button");
      label.id = "ceplogZoomLabel";
      label.type = "button";
      label.title = "Ekranı 100% yap";
      label.textContent = Math.round(getZoom() * 100) + "%";
      label.style.border = "0";
      label.style.borderRadius = "10px";
      label.style.background = "#eff6ff";
      label.style.color = "#1d4ed8";
      label.style.fontWeight = "1000";
      label.style.fontSize = "12px";
      label.style.height = "34px";
      label.style.minWidth = "52px";
      label.style.cursor = "pointer";
      label.onclick = function () {
        applyZoom(1);
      };

      const plus = makeButton("+", "Ekranı büyüt", function () {
        applyZoom(getZoom() + STEP);
      });

      wrap.appendChild(dragHandle);
      wrap.appendChild(minus);
      wrap.appendChild(label);
      wrap.appendChild(plus);
      document.body.appendChild(wrap);

      const savedPosition = getSavedZoomPosition();
      if (savedPosition) placeZoomControl(wrap, savedPosition.x, savedPosition.y, false);
      enableZoomControlDrag(wrap, dragHandle);
      applyZoom(getZoom());
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", createZoomControl);
    } else {
      createZoomControl();
    }
  })();
</script>

</body>
</html>
