<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEPLOG</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

<script>
  (function () {
    const STORAGE_KEY = "ceplog_screen_zoom";
    const MIN_ZOOM = 0.75;
    const MAX_ZOOM = 1.25;
    const STEP = 0.05;
    const POSITION_KEY = "ceplog_zoom_control_position";

    function getSavedPosition() {
      try {
        return JSON.parse(localStorage.getItem(POSITION_KEY) || "null");
      } catch (error) {
        return null;
      }
    }

    function savePosition(position) {
      localStorage.setItem(POSITION_KEY, JSON.stringify(position));
    }

    function applyControlPosition(position) {
      const wrap = document.getElementById("ceplogZoomControl");
      if (!wrap || !position) return;
      const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      const rect = wrap.getBoundingClientRect();
      const maxLeft = Math.max(8, viewportWidth - rect.width - 8);
      const maxTop = Math.max(8, viewportHeight - rect.height - 8);
      const left = Math.min(maxLeft, Math.max(8, Number(position.left) || 8));
      const top = Math.min(maxTop, Math.max(8, Number(position.top) || 8));
      document.documentElement.style.setProperty("--ceplog-zoom-left", left + "px");
      document.documentElement.style.setProperty("--ceplog-zoom-top", top + "px");
    }

    function clamp(value) {
      return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, value));
    }

    function getZoom() {
      const saved = Number(localStorage.getItem(STORAGE_KEY));
      return saved ? clamp(saved) : 1;
    }

    function applyZoom(value) {
      const zoom = clamp(value);
      const root = document.getElementById("root");
      if (root) {
        root.style.zoom = String(zoom);
      }
      const zoomedIn = zoom > 1.001;
      document.documentElement.style.setProperty("--ceplog-screen-zoom", String(zoom));
      document.documentElement.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.style.minHeight = zoomedIn ? Math.ceil(zoom * 100) + "vh" : "";
      localStorage.setItem(STORAGE_KEY, String(zoom));

      const label = document.getElementById("ceplogZoomLabel");
      if (label) label.textContent = Math.round(zoom * 100) + "%";
    }

    function makeButton(text, title, onClick) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.title = title;
      btn.type = "button";
      btn.style.border = "0";
      btn.style.borderRadius = "10px";
      btn.style.background = "#071226";
      btn.style.color = "#fff";
      btn.style.fontWeight = "900";
      btn.style.fontSize = "14px";
      btn.style.height = "34px";
      btn.style.minWidth = "34px";
      btn.style.cursor = "pointer";
      btn.style.boxShadow = "0 8px 18px rgba(7,18,38,.18)";
      btn.onclick = onClick;
      return btn;
    }

    function createZoomControl() {
      if (document.getElementById("ceplogZoomControl")) return;

      const wrap = document.createElement("div");
      wrap.id = "ceplogZoomControl";
      wrap.style.position = "fixed";
      wrap.style.left = "var(--ceplog-zoom-left, 14px)";
      wrap.style.top = "var(--ceplog-zoom-top, 14px)";
      wrap.style.right = "auto";
      wrap.style.bottom = "auto";
      wrap.style.zIndex = "999999";
      wrap.style.display = "flex";
      wrap.style.alignItems = "center";
      wrap.style.gap = "6px";
      wrap.style.padding = "7px";
      wrap.style.borderRadius = "16px";
      wrap.style.background = "rgba(255,255,255,.92)";
      wrap.style.border = "1px solid #dbe3ef";
      wrap.style.boxShadow = "0 14px 35px rgba(15,23,42,.18)";
      wrap.style.backdropFilter = "blur(12px)";
      wrap.style.cursor = "grab";
      wrap.style.userSelect = "none";
      wrap.style.touchAction = "none";

      const minus = makeButton("−", "Ekranı küçült", function () {
        applyZoom(getZoom() - STEP);
      });

      const label = document.createElement("button");
      label.id = "ceplogZoomLabel";
      label.type = "button";
      label.title = "Ekranı 100% yap";
      label.textContent = Math.round(getZoom() * 100) + "%";
      label.style.border = "0";
      label.style.borderRadius = "10px";
      label.style.background = "#eff6ff";
      label.style.color = "#1d4ed8";
      label.style.fontWeight = "1000";
      label.style.fontSize = "12px";
      label.style.height = "34px";
      label.style.minWidth = "52px";
      label.style.cursor = "pointer";
      label.onclick = function () {
        applyZoom(1);
      };

      const plus = makeButton("+", "Ekranı büyüt", function () {
        applyZoom(getZoom() + STEP);
      });

      let dragState = null;
      wrap.addEventListener("pointerdown", function (event) {
        if (event.button !== undefined && event.button !== 0) return;
        const rect = wrap.getBoundingClientRect();
        dragState = {
          pointerId: event.pointerId,
          offsetX: event.clientX - rect.left,
          offsetY: event.clientY - rect.top,
          moved: false,
        };
        wrap.setPointerCapture?.(event.pointerId);
        wrap.style.cursor = "grabbing";
      });

      wrap.addEventListener("pointermove", function (event) {
        if (!dragState || dragState.pointerId !== event.pointerId) return;
        const nextPosition = {
          left: event.clientX - dragState.offsetX,
          top: event.clientY - dragState.offsetY,
        };
        dragState.moved = true;
        applyControlPosition(nextPosition);
        savePosition({
          left: parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--ceplog-zoom-left")) || nextPosition.left,
          top: parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--ceplog-zoom-top")) || nextPosition.top,
        });
      });

      function endDrag(event) {
        if (!dragState || dragState.pointerId !== event.pointerId) return;
        wrap.releasePointerCapture?.(event.pointerId);
        wrap.style.cursor = "grab";
        setTimeout(function () { dragState = null; }, 0);
      }

      wrap.addEventListener("pointerup", endDrag);
      wrap.addEventListener("pointercancel", endDrag);
      wrap.addEventListener("click", function (event) {
        if (dragState?.moved) event.preventDefault();
      }, true);

      window.addEventListener("resize", function () {
        applyControlPosition(getSavedPosition());
      });

      wrap.appendChild(minus);
      wrap.appendChild(label);
      wrap.appendChild(plus);
      document.body.appendChild(wrap);

      applyControlPosition(getSavedPosition());
      applyZoom(getZoom());
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", createZoomControl);
    } else {
      createZoomControl();
    }
  })();
</script>

</body>
</html>
