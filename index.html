<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEPLOG</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

<script>
  (function () {
    const STORAGE_KEY = "ceplog_screen_zoom";
    const POSITION_KEY = "ceplog_zoom_control_position";
    const MIN_ZOOM = 0.75;
    const MAX_ZOOM = 1.25;
    const STEP = 0.05;

    function clamp(value) {
      return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, value));
    }

    function getZoom() {
      const saved = Number(localStorage.getItem(STORAGE_KEY));
      return saved ? clamp(saved) : 1;
    }

    function applyZoom(value) {
      const zoom = clamp(value);
      const root = document.getElementById("root");
      if (root) {
        root.style.zoom = String(zoom);
      }
      const zoomedIn = zoom > 1.001;
      document.documentElement.style.setProperty("--ceplog-screen-zoom", String(zoom));
      document.documentElement.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.classList.toggle("ceplog-zoomed-in", zoomedIn);
      document.body.style.minHeight = zoomedIn ? Math.ceil(zoom * 100) + "vh" : "";
      localStorage.setItem(STORAGE_KEY, String(zoom));

      const label = document.getElementById("ceplogZoomLabel");
      if (label) label.textContent = Math.round(zoom * 100) + "%";
    }

    function getSavedPosition() {
      try {
        const saved = JSON.parse(localStorage.getItem(POSITION_KEY) || "null");
        if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) return saved;
      } catch (error) {
        localStorage.removeItem(POSITION_KEY);
      }
      return null;
    }

    function clampPosition(x, y, element) {
      const rect = element?.getBoundingClientRect?.();
      const width = rect?.width || 150;
      const height = rect?.height || 48;
      return {
        x: Math.min(Math.max(8, x), Math.max(8, window.innerWidth - width - 8)),
        y: Math.min(Math.max(8, y), Math.max(8, window.innerHeight - height - 8)),
      };
    }

    function setZoomControlPosition(element, position, save = true) {
      const next = clampPosition(position.x, position.y, element);
      element.style.setProperty("left", next.x + "px", "important");
      element.style.setProperty("top", next.y + "px", "important");
      element.style.setProperty("right", "auto", "important");
      element.style.setProperty("bottom", "auto", "important");
      if (save) localStorage.setItem(POSITION_KEY, JSON.stringify(next));
    }

    function makeButton(text, title, onClick) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.title = title;
      btn.type = "button";
      btn.style.border = "0";
      btn.style.borderRadius = "10px";
      btn.style.background = "#071226";
      btn.style.color = "#fff";
      btn.style.fontWeight = "900";
      btn.style.fontSize = "14px";
      btn.style.height = "34px";
      btn.style.minWidth = "34px";
      btn.style.cursor = "pointer";
      btn.style.boxShadow = "0 8px 18px rgba(7,18,38,.18)";
      btn.onclick = onClick;
      return btn;
    }

    function createZoomControl() {
      if (document.getElementById("ceplogZoomControl")) return;

      const wrap = document.createElement("div");
      wrap.id = "ceplogZoomControl";
      wrap.style.position = "fixed";
      wrap.style.right = "14px";
      wrap.style.bottom = "14px";
      wrap.style.zIndex = "999999";
      wrap.style.display = "flex";
      wrap.style.alignItems = "center";
      wrap.style.gap = "6px";
      wrap.style.padding = "7px";
      wrap.style.borderRadius = "16px";
      wrap.style.background = "rgba(255,255,255,.92)";
      wrap.style.border = "1px solid #dbe3ef";
      wrap.style.boxShadow = "0 14px 35px rgba(15,23,42,.18)";
      wrap.style.backdropFilter = "blur(12px)";

      const grip = document.createElement("span");
      grip.textContent = "↕";
      grip.title = "Zoom tuşunu taşımak için sürükle";
      grip.style.width = "22px";
      grip.style.height = "34px";
      grip.style.borderRadius = "10px";
      grip.style.display = "inline-flex";
      grip.style.alignItems = "center";
      grip.style.justifyContent = "center";
      grip.style.background = "#e0ecff";
      grip.style.color = "#1d4ed8";
      grip.style.fontWeight = "1000";
      grip.style.cursor = "grab";
      grip.style.userSelect = "none";
      grip.setAttribute("aria-label", "Zoom kontrolünü taşı");

      const minus = makeButton("−", "Ekranı küçült", function () {
        applyZoom(getZoom() - STEP);
      });

      const label = document.createElement("button");
      label.id = "ceplogZoomLabel";
      label.type = "button";
      label.title = "Ekranı 100% yap";
      label.textContent = Math.round(getZoom() * 100) + "%";
      label.style.border = "0";
      label.style.borderRadius = "10px";
      label.style.background = "#eff6ff";
      label.style.color = "#1d4ed8";
      label.style.fontWeight = "1000";
      label.style.fontSize = "12px";
      label.style.height = "34px";
      label.style.minWidth = "52px";
      label.style.cursor = "pointer";
      label.onclick = function () {
        applyZoom(1);
      };

      const plus = makeButton("+", "Ekranı büyüt", function () {
        applyZoom(getZoom() + STEP);
      });

      wrap.appendChild(grip);
      wrap.appendChild(minus);
      wrap.appendChild(label);
      wrap.appendChild(plus);
      document.body.appendChild(wrap);

      const savedPosition = getSavedPosition();
      if (savedPosition) {
        setZoomControlPosition(wrap, savedPosition, false);
      } else {
        requestAnimationFrame(function () {
          setZoomControlPosition(wrap, { x: window.innerWidth - wrap.offsetWidth - 14, y: window.innerHeight - wrap.offsetHeight - 14 }, false);
        });
      }

      let dragState = null;
      grip.addEventListener("pointerdown", function (event) {
        const rect = wrap.getBoundingClientRect();
        dragState = { startX: event.clientX, startY: event.clientY, left: rect.left, top: rect.top };
        grip.style.cursor = "grabbing";
        grip.setPointerCapture?.(event.pointerId);
        event.preventDefault();
      });

      grip.addEventListener("pointermove", function (event) {
        if (!dragState) return;
        setZoomControlPosition(wrap, {
          x: dragState.left + event.clientX - dragState.startX,
          y: dragState.top + event.clientY - dragState.startY,
        });
      });

      function endDrag() {
        dragState = null;
        grip.style.cursor = "grab";
      }

      grip.addEventListener("pointerup", endDrag);
      grip.addEventListener("pointercancel", endDrag);
      window.addEventListener("resize", function () {
        const rect = wrap.getBoundingClientRect();
        setZoomControlPosition(wrap, { x: rect.left, y: rect.top });
      });

      applyZoom(getZoom());
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", createZoomControl);
    } else {
      createZoomControl();
    }
  })();
</script>

</body>
</html>
